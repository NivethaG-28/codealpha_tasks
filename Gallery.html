<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumière — Image Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* --- RESET & VARIABLES --- */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0e0e0e;
  --bg-elevated: #1a1a1a;
  --text: #e8e4de;
  --text-muted: #8a8480;
  --accent: #c9a96e;
  --accent-dim: #a07d4a;
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans: 'DM Sans', system-ui, sans-serif;
  --ease: cubic-bezier(0.22, 1, 0.36, 1);
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  overflow-x: hidden;
  line-height: 1.6;
}

/* --- GRAIN OVERLAY --- */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
}

/* --- HEADER --- */
header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  padding: 1.5rem 3rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: linear-gradient(to bottom, rgba(14,14,14,0.95), transparent);
  backdrop-filter: blur(8px);
  transition: all 0.4s var(--ease);
}

.logo {
  font-family: var(--serif);
  font-size: 1.6rem;
  font-weight: 300;
  letter-spacing: 0.15em;
  color: var(--accent);
  text-transform: uppercase;
}

.logo span {
  font-style: italic;
  font-weight: 300;
  color: var(--text);
  font-size: 0.85em;
  letter-spacing: 0.05em;
  text-transform: none;
}

/* --- HERO --- */
.hero {
  height: 55vh;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 0 3rem 3rem;
  position: relative;
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 30% 50%, rgba(201,169,110,0.06) 0%, transparent 60%);
}

.hero h1 {
  font-family: var(--serif);
  font-size: clamp(3rem, 8vw, 7rem);
  font-weight: 300;
  line-height: 0.95;
  letter-spacing: -0.02em;
  opacity: 0;
  transform: translateY(40px);
  animation: fadeUp 1s var(--ease) 0.3s forwards;
}

.hero h1 em {
  font-style: italic;
  color: var(--accent);
}

.hero p {
  margin-top: 1.2rem;
  font-size: 1rem;
  color: var(--text-muted);
  max-width: 480px;
  letter-spacing: 0.02em;
  opacity: 0;
  transform: translateY(20px);
  animation: fadeUp 0.8s var(--ease) 0.6s forwards;
}

@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}

/* --- FILTERS --- */
.filters {
  padding: 0 3rem;
  margin-bottom: 2.5rem;
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  opacity: 0;
  animation: fadeUp 0.8s var(--ease) 0.8s forwards;
}

.filter-btn {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--text-muted);
  font-family: var(--sans);
  font-size: 0.8rem;
  padding: 0.5rem 1.2rem;
  border-radius: 100px;
  cursor: pointer;
  transition: all 0.35s var(--ease);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.filter-btn:hover {
  border-color: var(--accent-dim);
  color: var(--text);
}

.filter-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--bg);
}

/* --- GALLERY GRID --- */
.gallery {
  padding: 0 3rem 6rem;
  columns: 3;
  column-gap: 1.2rem;
}

.gallery-item {
  break-inside: avoid;
  margin-bottom: 1.2rem;
  position: relative;
  border-radius: 6px;
  overflow: hidden;
  cursor: pointer;
  opacity: 0;
  transform: translateY(30px) scale(0.97);
  transition: opacity 0.6s var(--ease), transform 0.6s var(--ease);
}

.gallery-item.visible {
  opacity: 1;
  transform: translateY(0) scale(1);
}

.gallery-item img {
  width: 100%;
  display: block;
  transition: transform 0.7s var(--ease), filter 0.7s var(--ease);
  filter: brightness(0.85) saturate(0.9);
}

.gallery-item:hover img {
  transform: scale(1.05);
  filter: brightness(1) saturate(1);
}

.gallery-item .overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 50%);
  opacity: 0;
  transition: opacity 0.5s var(--ease);
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 1.5rem;
}

.gallery-item:hover .overlay {
  opacity: 1;
}

.overlay h3 {
  font-family: var(--serif);
  font-size: 1.3rem;
  font-weight: 400;
  transform: translateY(10px);
  transition: transform 0.4s var(--ease);
}

.overlay .tag {
  font-size: 0.7rem;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 0.3rem;
  transform: translateY(10px);
  transition: transform 0.4s var(--ease) 0.05s;
}

.gallery-item:hover .overlay h3,
.gallery-item:hover .overlay .tag {
  transform: translateY(0);
}

/* --- LIGHTBOX --- */
.lightbox {
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: rgba(5,5,5,0.96);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.4s var(--ease), visibility 0.4s;
  backdrop-filter: blur(20px);
}

.lightbox.open {
  opacity: 1;
  visibility: visible;
}

.lightbox-content {
  position: relative;
  max-width: 85vw;
  max-height: 85vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.lightbox-content img {
  max-width: 100%;
  max-height: 85vh;
  object-fit: contain;
  border-radius: 4px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  transform: scale(0.9);
  transition: transform 0.5s var(--ease);
}

.lightbox.open .lightbox-content img {
  transform: scale(1);
}

.lightbox-close {
  position: absolute;
  top: 2rem;
  right: 2rem;
  width: 48px;
  height: 48px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 50%;
  color: var(--text);
  font-size: 1.2rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s var(--ease);
  z-index: 10;
}

.lightbox-close:hover {
  background: rgba(255,255,255,0.12);
  transform: rotate(90deg);
}

.lightbox-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 52px;
  height: 52px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 50%;
  color: var(--text);
  font-size: 1.3rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s var(--ease);
  z-index: 10;
}

.lightbox-nav:hover {
  background: rgba(255,255,255,0.12);
}

.lightbox-prev { left: 2rem; }
.lightbox-next { right: 2rem; }

.lightbox-info {
  position: absolute;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
}

.lightbox-info h3 {
  font-family: var(--serif);
  font-size: 1.4rem;
  font-weight: 400;
}

.lightbox-info .tag {
  font-size: 0.7rem;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-top: 0.3rem;
}

.lightbox-counter {
  position: absolute;
  top: 2rem;
  left: 2rem;
  font-size: 0.8rem;
  color: var(--text-muted);
  letter-spacing: 0.1em;
}

/* --- RESPONSIVE --- */
@media (max-width: 900px) {
  .gallery { columns: 2; }
  header, .hero, .filters, .gallery { padding-left: 1.5rem; padding-right: 1.5rem; }
}

@media (max-width: 600px) {
  .gallery { columns: 1; }
  .hero h1 { font-size: 2.8rem; }
  .lightbox-nav { display: none; }
}
</style>
</head>
<body>

<header>
  <div class="logo">Lumière <span>gallery</span></div>
</header>

<section class="hero">
  <h1>A Curated<br><em>Visual</em> Journal</h1>
  <p>An editorial collection of moments — landscapes, architecture, portraits, and the quiet beauty of everyday life.</p>
</section>

<div class="filters">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="landscape">Landscape</button>
  <button class="filter-btn" data-filter="architecture">Architecture</button>
  <button class="filter-btn" data-filter="portrait">Portrait</button>
  <button class="filter-btn" data-filter="nature">Nature</button>
</div>

<div class="gallery" id="gallery"></div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lb-close">&#x2715;</button>
  <span class="lightbox-counter" id="lb-counter"></span>
  <button class="lightbox-nav lightbox-prev" id="lb-prev">&#8592;</button>
  <button class="lightbox-nav lightbox-next" id="lb-next">&#8594;</button>
  <div class="lightbox-content">
    <img id="lb-img" src="" alt="">
  </div>
  <div class="lightbox-info">
    <h3 id="lb-title"></h3>
    <div class="tag" id="lb-tag"></div>
  </div>
</div>

<script>
/* --- IMAGE DATA --- */
const photos = [
  { id: 1, src: 'https://picsum.photos/seed/lum01/600/800', title: 'Golden Hour Ridge', cat: 'landscape', h: 800, w: 600 },
  { id: 2, src: 'https://picsum.photos/seed/lum02/600/400', title: 'Concrete Symmetry', cat: 'architecture', h: 400, w: 600 },
  { id: 3, src: 'https://picsum.photos/seed/lum03/600/750', title: 'The Quiet Gaze', cat: 'portrait', h: 750, w: 600 },
  { id: 4, src: 'https://picsum.photos/seed/lum04/600/900', title: 'Morning Dew', cat: 'nature', h: 900, w: 600 },
  { id: 5, src: 'https://picsum.photos/seed/lum05/600/420', title: 'Brutalist Dreams', cat: 'architecture', h: 420, w: 600 },
  { id: 6, src: 'https://picsum.photos/seed/lum06/600/700', title: 'Autumn Canopy', cat: 'landscape', h: 700, w: 600 },
  { id: 7, src: 'https://picsum.photos/seed/lum07/600/850', title: 'Silhouette Study', cat: 'portrait', h: 850, w: 600 },
  { id: 8, src: 'https://picsum.photos/seed/lum08/600/600', title: 'Fern Unfurling', cat: 'nature', h: 600, w: 600 },
  { id: 9, src: 'https://picsum.photos/seed/lum09/600/380', title: 'Glass & Steel', cat: 'architecture', h: 380, w: 600 },
  { id: 10, src: 'https://picsum.photos/seed/lum10/600/820', title: 'Coastal Fog', cat: 'landscape', h: 820, w: 600 },
  { id: 11, src: 'https://picsum.photos/seed/lum11/600/700', title: 'Wildflower Meadow', cat: 'nature', h: 700, w: 600 },
  { id: 12, src: 'https://picsum.photos/seed/lum12/600/900', title: 'Inner Light', cat: 'portrait', h: 900, w: 600 },
  { id: 13, src: 'https://picsum.photos/seed/lum13/600/440', title: 'Spiral Staircase', cat: 'architecture', h: 440, w: 600 },
  { id: 14, src: 'https://picsum.photos/seed/lum14/600/750', title: 'Desert Palette', cat: 'landscape', h: 750, w: 600 },
  { id: 15, src: 'https://picsum.photos/seed/lum15/600/650', title: 'Moss & Stone', cat: 'nature', h: 650, w: 600 },
];

const gallery = document.getElementById('gallery');
let filtered = [...photos];
let currentIndex = 0;

function renderGallery(items) {
  gallery.innerHTML = '';
  items.forEach((photo, i) => {
    const item = document.createElement('div');
    item.className = 'gallery-item';
    item.dataset.index = i;
    item.innerHTML = `
      <img src="${photo.src}" alt="${photo.title}" loading="lazy">
      <div class="overlay">
        <div class="tag">${photo.cat}</div>
        <h3>${photo.title}</h3>
      </div>
    `;
    item.addEventListener('click', () => openLightbox(i));
    gallery.appendChild(item);

    setTimeout(() => item.classList.add('visible'), 80 * i);
  });
}

/* --- FILTERS --- */
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filter = btn.dataset.filter;
    filtered = filter === 'all' ? [...photos] : photos.filter(p => p.cat === filter);
    renderGallery(filtered);
  });
});

/* --- LIGHTBOX --- */
const lightbox = document.getElementById('lightbox');
const lbImg = document.getElementById('lb-img');
const lbTitle = document.getElementById('lb-title');
const lbTag = document.getElementById('lb-tag');
const lbCounter = document.getElementById('lb-counter');

function openLightbox(index) {
  currentIndex = index;
  updateLightbox();
  lightbox.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  lightbox.classList.remove('open');
  document.body.style.overflow = '';
}

function updateLightbox() {
  const photo = filtered[currentIndex];
  lbImg.src = photo.src.replace('/600/', '/1200/');
  lbTitle.textContent = photo.title;
  lbTag.textContent = photo.cat;
  lbCounter.textContent = `${currentIndex + 1} / ${filtered.length}`;
}

function navigate(dir) {
  currentIndex = (currentIndex + dir + filtered.length) % filtered.length;
  updateLightbox();
}

document.getElementById('lb-close').addEventListener('click', closeLightbox);
document.getElementById('lb-prev').addEventListener('click', () => navigate(-1));
document.getElementById('lb-next').addEventListener('click', () => navigate(1));

lightbox.addEventListener('click', (e) => {
  if (e.target === lightbox) closeLightbox();
});

document.addEventListener('keydown', (e) => {
  if (!lightbox.classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navigate(-1);
  if (e.key === 'ArrowRight') navigate(1);
});

/* --- TOUCH SWIPE --- */
let touchStartX = 0;
lightbox.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; });
lightbox.addEventListener('touchend', e => {
  const diff = e.changedTouches[0].screenX - touchStartX;
  if (Math.abs(diff) > 50) navigate(diff > 0 ? -1 : 1);
});

/* --- INIT --- */
renderGallery(filtered);
</script>
</body>
</html>
